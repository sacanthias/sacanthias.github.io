<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>sacanthias portfolio</title>
</head>

<!--importing bootstrap 5-->
<script src=" https://cdn.jsdelivr.net/npm/bootstrap/dist/js/bootstrap.bundle.min.js "></script>
<link href=" https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.min.css " rel="stylesheet">

<!--link to the local stylesheet-->
<link rel="stylesheet" href="{{ get_url(path="style.css", cachebust=true) | safe }}">

<!-- link to fontawesome stylesheets -->
<link rel="stylesheet" href="files/fontawesome/css/fontawesome.min.css">
<link rel="stylesheet" href="files/fontawesome/css/brands.min.css">
<link rel="stylesheet" href="files/fontawesome/css/regular.min.css">
<link rel="stylesheet" href="files/fontawesome/css/solid.min.css">

<body> 
  <div id="content">
    <!--sidebar-->
    <div id="aside">
        <nav>
          <li class="nav-item">
            <a href="/" class="nav-link">home</a>
          </li>

          <li class="nav-item">
            <a href="{{ get_url(path='@/blog/_index.md') }}"  class="nav-link">blog</a>
          </li>

          <li class="nav-item">
            <a href="{{ get_url(path='@/projects/_index.md') }}" class="nav-link">projects</a>
          </li>
        </nav>
    </div>

    <!--main content-->
    <div id="main">
        <div class="container-body">
          {% block content %} {% endblock %}
        </div>
    </div>

    <div id="footer">
      <p>&copy; Naomi Belgrave 2025 | Powered by <a href="https://www.getzola.org/">Zola</a> | Hosted on <a href="https://pages.github.com/">GitHub Pages</a></p>
    </div>
  </div>

  <!-- tooltip js -->
  <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.7/jquery.min.js"></script>
  <script src="files/tooltips/jquery.style-my-tooltips.js"></script>

  <script>
    (function($){
        $(document).ready(function(){
            $("[title]").style_my_tooltips();
        });
    })(jQuery);
</script>
</body>
</html>
