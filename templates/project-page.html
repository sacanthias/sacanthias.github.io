{% extends "base.html" %}

{% block content %}
<div class="title">
    <h1>
      {{ page.title }}
    </h1>
</div>
<p class="subtitle">
    <strong>
        {{ page.date | date(format="%b %Y") }}
        {% if page.extra.end_date %}
            {{ page.extra.end_date | date(format="%b %Y") }}
        {% else %}
            - present
        {% endif %}
    </strong>
    <em>{{ page.description }}</em>
</p>
{{ page.content | safe }}
{% endblock content %}
